configuration:
  log_level:
    name: Log Level
    description: Controls the verbosity of add-on logging. Set to 'debug' for troubleshooting.
  mqtt_enabled:
    name: Enable MQTT
    description: Enable MQTT integration for Home Assistant control and state reporting.
  mqtt_host:
    name: MQTT Host
    description: Hostname or IP address of your MQTT broker. Use 'core-mosquitto' for the Mosquitto add-on.
  mqtt_port:
    name: MQTT Port
    description: Port number of your MQTT broker. Default is 1883.
  mqtt_username:
    name: MQTT Username
    description: Username for MQTT broker authentication. Leave empty if not required.
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT broker authentication. Leave empty if not required.
  mqtt_topic_prefix:
    name: MQTT Topic Prefix
    description: Prefix for all MQTT topics published by this add-on. Default is 'ddcutil'.
  mqtt_discovery:
    name: Enable MQTT Discovery
    description: Automatically create entities in Home Assistant via MQTT discovery.
  mqtt_discovery_prefix:
    name: MQTT Discovery Prefix
    description: MQTT discovery prefix used by Home Assistant. Default is 'homeassistant'.
  poll_enabled:
    name: Enable State Polling
    description: >-
      Periodically poll the monitor for current state. Disabled by default to
      protect the I2C bus. Only enable if you need state sync from external changes.
  poll_interval:
    name: Poll Interval (seconds)
    description: >-
      How often to poll monitor state in seconds. Minimum 60 seconds.
      Only used when polling is enabled. Default is 600 (10 minutes).
  input_sources:
    name: Input Source Aliases
    description: >-
      Map VCP input source values to friendly names. Run the add-on first and
      check the log or capabilities.txt in your addon_configs folder to find
      your monitor's VCP values.
    fields:
      vcp_value:
        name: VCP Value
        description: The numeric VCP value for this input source (e.g. 17 for HDMI-1).
      alias:
        name: Alias
        description: Friendly name for this input (e.g. 'Gaming PC', 'Laptop').
